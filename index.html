<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <title>TEST PAGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        @media (max-width: 640px) {
            .desktop-table { display: none !important; }
            .mobile-card { display: block !important; }
        }
        .mobile-card { display: none; }
        #errorMessage { transition: opacity 0.4s ease; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">

    <div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 p-6 sm:p-8 rounded-3xl border border-zinc-700 w-full max-w-sm sm:max-w-md mx-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl sm:text-3xl font-semibold logo-font">Admin Login</h2>
                <button onclick="hideLoginModal()" class="text-3xl text-zinc-400 hover:text-white">×</button>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm text-zinc-400 mb-2">Username</label>
                    <input id="loginUsername" type="text" value="admin" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-zinc-400 mb-2">Password</label>
                    <input id="loginPassword" type="password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none" oninput="hideError()">
                    <p id="errorMessage" class="text-red-400 text-sm mt-2 hidden">Incorrect credentials</p>
                </div>
                <button onclick="attemptLogin()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-zinc-950 font-semibold py-4 rounded-3xl">Login</button>
            </div>
            <p class="text-center text-xs text-zinc-500 mt-6"> <strong></strong> <strong></strong></p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-4 sm:p-6">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-yellow-400 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-hand-holding-dollar text-zinc-950 text-3xl"></i>
                </div>
                <div>
                    <h1 class="logo-font text-4xl font-semibold tracking-tighter">TEST<span class="text-yellow-400">.</span></h1>
                    <p class="text-zinc-400">TESTNAME</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button id="loginBtn" onclick="showLoginModal()" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-3xl text-yellow-400">
                    <i class="fa-solid fa-right-to-bracket"></i> Admin Login
                </button>
                <button id="logoutBtn" onclick="logout()" class="hidden flex items-center gap-2 bg-red-500/20 text-red-400 px-5 py-2.5 rounded-3xl">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 mb-6">
            <input id="searchInput" type="text" placeholder="Search anything..." oninput="filterTable()" 
                   class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-yellow-400 rounded-3xl px-6 py-4 outline-none">
            <button id="addBtn" onclick="showAddModal()" class="hidden items-center gap-2 bg-yellow-400 hover:bg-yellow-300 text-zinc-950 font-semibold px-6 py-4 rounded-3xl">
                <i class="fa-solid fa-plus"></i> Add Record
            </button>
        </div>

        <div class="bg-zinc-900 rounded-3xl border border-zinc-800 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full hidden sm:table">
                    <thead class="bg-zinc-950">
                        <tr>
                            <th class="px-6 py-5 text-left text-xs uppercase tracking-wider text-zinc-400">Name</th>
                            <th class="px-6 py-5 text-left text-xs uppercase tracking-wider text-zinc-400">Area</th>
                            <th class="px-6 py-5 text-left text-xs uppercase tracking-wider text-zinc-400">City</th>
                            <th class="px-6 py-5 text-left text-xs uppercase tracking-wider text-zinc-400">Collected By</th>
                            <th class="px-6 py-5 text-left text-xs uppercase tracking-wider text-zinc-400">Amount</th>
                            <th class="px-6 py-5 text-left text-xs uppercase tracking-wider text-zinc-400">Date</th>
                            <th class="px-6 py-5 text-left text-xs uppercase tracking-wider text-zinc-400">Mode</th>
                            <th class="px-6 py-5"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="mobileCards" class="p-4 sm:hidden space-y-4"></div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 w-full max-w-lg rounded-3xl p-6 mx-4">
            <h3 id="modalTitle" class="text-2xl font-semibold mb-6">Add Record</h3>
            <div class="space-y-5">
                <input id="formName" placeholder="Name *" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none">
                <input id="formArea" placeholder="Area" value="Malad" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none">
                <input id="formCity" placeholder="City" value="Mumbai" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none">
                <input id="formCollectedBy" placeholder="Collected By *" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none">
                <input id="formAmount" type="number" placeholder="Amount ₹ *" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none">
                <input id="formDate" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none">
                <select id="formMode" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none">
                    <option value="UPI">UPI</option>
                    <option value="Cash">Cash</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                </select>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="hideModal()" class="flex-1 py-4 bg-zinc-800 rounded-3xl hover:bg-zinc-700">Cancel</button>
                <button onclick="saveRecord()" class="flex-1 py-4 bg-yellow-400 text-zinc-950 rounded-3xl font-semibold hover:bg-yellow-300">Save</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbw0QajAKeZBKYiOrV8O32Z4ycMDQAFWPeyTNibEfT5v0gIGoGzew0XUuPHU9CIRGXiLSg/exec"; 

        let records = [];
        let isLoggedIn = false;
        let editIndex = -1; // stores sheet row number

        // ================== AUTH ==================
        function showLoginModal() { document.getElementById('loginModal').classList.remove('hidden'); }
        function hideLoginModal() { document.getElementById('loginModal').classList.add('hidden'); }
        function hideError() { document.getElementById('errorMessage').classList.add('hidden'); }

        function attemptLogin() {
            const user = document.getElementById('loginUsername').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            if (user === "admin" && pass === "malad123") {
                isLoggedIn = true;
                hideLoginModal();
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('addBtn').classList.remove('hidden');
                renderAll(); 
            } else {
                document.getElementById('errorMessage').classList.remove('hidden');
            }
        }

        function logout() {
            isLoggedIn = false;
            document.getElementById('loginBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('addBtn').classList.add('hidden');
            renderAll();
        }

        // ================== MODALS ==================
        function showAddModal() {
            editIndex = -1;
            document.getElementById('modalTitle').innerText = "Add Record";
            // Reset form
            document.getElementById('formName').value = "";
            document.getElementById('formCollectedBy').value = "";
            document.getElementById('formAmount').value = "";
            document.getElementById('formDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('modal').classList.remove('hidden');
        }

        function hideModal() { document.getElementById('modal').classList.add('hidden'); }

        // ================== DATA HANDLING ==================
        async function loadData() {
            try {
                const res = await fetch(SHEET_URL);
                records = await res.json();
                renderAll();
            } catch (e) {
                console.error("Load error:", e);
                alert("Cannot connect to Google Sheet. Check URL and CORS settings.");
            }
        }

        async function saveToSheet(payload) {
            try {
                const res = await fetch(SHEET_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.status === "success") {
                    records = result.data;
                    renderAll();
                    return true;
                }
            } catch (e) {
                console.error("Save error:", e);
            }
            return false;
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderAll(query);
        }

        function renderAll(filter = '') {
            const tbody = document.getElementById('tableBody');
            const mobileContainer = document.getElementById('mobileCards');
            tbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            const filtered = records.filter(r => 
                Object.values(r).some(val => String(val).toLowerCase().includes(filter))
            );

            filtered.forEach((rec) => {
                // Desktop
                const tr = document.createElement('tr');
                tr.className = "border-t border-zinc-800 hover:bg-zinc-900 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4 font-medium">${rec.name}</td>
                    <td class="px-6 py-4 text-zinc-400">${rec.area}</td>
                    <td class="px-6 py-4 text-zinc-400">${rec.city}</td>
                    <td class="px-6 py-4 text-zinc-400">${rec.collectedBy}</td>
                    <td class="px-6 py-4 text-yellow-400 font-semibold">₹${rec.amount}</td>
                    <td class="px-6 py-4 text-zinc-400">${rec.date}</td>
                    <td class="px-6 py-4"><span class="px-3 py-1 bg-zinc-800 rounded-full text-xs">${rec.mode}</span></td>
                    <td class="px-6 py-4 text-right">
                        ${isLoggedIn ? `
                            <button onclick="editRecord(${rec.row})" class="text-blue-400 hover:text-blue-300 mr-3"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteRecord(${rec.row})" class="text-red-400 hover:text-red-300"><i class="fa-solid fa-trash"></i></button>
                        ` : ''}
                    </td>
                `;
                tbody.appendChild(tr);

                // Mobile
                const card = document.createElement('div');
                card.className = "bg-zinc-900 p-5 rounded-3xl border border-zinc-800";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-lg">${rec.name}</h4>
                        <span class="text-yellow-400 font-bold">₹${rec.amount}</span>
                    </div>
                    <div class="text-sm text-zinc-400 mb-4">
                        <p>${rec.area}, ${rec.city}</p>
                        <p>By: ${rec.collectedBy}</p>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs bg-zinc-800 px-3 py-1 rounded-full text-zinc-400">${rec.date} (${rec.mode})</span>
                        ${isLoggedIn ? `
                            <div class="flex gap-4">
                                <button onclick="editRecord(${rec.row})" class="text-blue-400"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="deleteRecord(${rec.row})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        ` : ''}
                    </div>
                `;
                mobileContainer.appendChild(card);
            });
        }

        // ================== CRUD ACTIONS ==================
        async function saveRecord() {
            if (!isLoggedIn) return;
            
            const payload = {
                action: editIndex > 0 ? "edit" : "add",
                row: editIndex > 0 ? editIndex : null,
                name: document.getElementById('formName').value,
                area: document.getElementById('formArea').value,
                city: document.getElementById('formCity').value,
                collectedBy: document.getElementById('formCollectedBy').value,
                amount: parseFloat(document.getElementById('formAmount').value),
                date: document.getElementById('formDate').value,
                mode: document.getElementById('formMode').value
            };

            if(!payload.name || !payload.amount || !payload.collectedBy) {
                alert("Please fill in all required fields (*)");
                return;
            }

            const success = await saveToSheet(payload);
            if (success) hideModal();
        }

        function editRecord(rowNum) {
            const rec = records.find(r => r.row === rowNum);
            if (!rec) return;
            
            editIndex = rowNum;
            document.getElementById('modalTitle').innerText = "Edit Record";
            document.getElementById('formName').value = rec.name;
            document.getElementById('formArea').value = rec.area;
            document.getElementById('formCity').value = rec.city;
            document.getElementById('formCollectedBy').value = rec.collectedBy;
            document.getElementById('formAmount').value = rec.amount;
            document.getElementById('formDate').value = rec.date;
            document.getElementById('formMode').value = rec.mode;
            document.getElementById('modal').classList.remove('hidden');
        }

        async function deleteRecord(rowNum) {
            if (!isLoggedIn || !confirm("Are you sure you want to delete this record?")) return;
            await saveToSheet({ action: "delete", row: rowNum });
        }

        // Run on load
        loadData();
    </script>
</body>
</html>
